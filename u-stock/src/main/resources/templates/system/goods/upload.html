
<!DOCTYPE html>
<html lang="zh">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>文件上传</title>
    <link href="/css/bootstrap.min.css?v=3.3.7" rel="stylesheet"/>
    <link href="/css/font-awesome.min.css?v=4.7.0" rel="stylesheet"/>
    <!-- bootstrap-table 表格插件样式 -->
    <link href="/ajax/libs/bootstrap-table/bootstrap-table.min.css?v=1.18.3" rel="stylesheet"/>
    <link href="/css/animate.min.css?v=20210831" rel="stylesheet"/>
    <link href="/css/style.min.css?v=20210831" rel="stylesheet"/>
    <link href="/ruoyi/css/ry-ui.css?v=4.7.6" rel="stylesheet"/>


    <link href="/ajax/libs/bootstrap-fileinput/fileinput.min.css?v=5.5.2" rel="stylesheet"/>

</head>
<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>上传商品图片 <small>请选择图片进行上传</small></h5>
                    <input id="id" th:value="${id}" name="id"  hidden="true"/>
                </div>
                <div class="ibox-content">
                    <div class="form-group">
                        <label class="font-noraml">图片上传</label>
                        <div class="file-loading">
                            <input id="singleFile" name="file" type="file">
                         <!-- 文件上传额外参数 -->
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script> var ctx = "\/"; var lockscreen = null; if(lockscreen){window.top.location=ctx+"lockscreen";} </script>
<a id="scroll-up" href="#" class="btn btn-sm display"><i class="fa fa-angle-double-up"></i></a>
<script src="/js/jquery.min.js?v=3.6.3"></script>
<script src="/js/bootstrap.min.js?v=3.3.7"></script>
<!-- bootstrap-table 表格插件 -->
<script src="/ajax/libs/bootstrap-table/bootstrap-table.min.js?v=1.18.3"></script>
<script src="/ajax/libs/bootstrap-table/locale/bootstrap-table-zh-CN.min.js?v=1.18.3"></script>
<script src="/ajax/libs/bootstrap-table/extensions/mobile/bootstrap-table-mobile.js?v=1.18.3"></script>
<!-- jquery-validate 表单验证插件 -->
<script src="/ajax/libs/validate/jquery.validate.min.js?v=1.19.3"></script>
<script src="/ajax/libs/validate/jquery.validate.extend.js?v=1.19.3"></script>
<script src="/ajax/libs/validate/messages_zh.js?v=1.19.3"></script>
<!-- bootstrap-table 表格树插件 -->
<script src="/ajax/libs/bootstrap-table/extensions/tree/bootstrap-table-tree.min.js?v=1.18.3"></script>
<!-- 遮罩层 -->
<script src="/ajax/libs/blockUI/jquery.blockUI.js?v=2.70.0"></script>
<script src="/ajax/libs/iCheck/icheck.min.js?v=1.0.3"></script>
<script src="/ajax/libs/layer/layer.min.js?v=3.5.1"></script>
<script src="/ajax/libs/layui/layui.min.js?v=2.7.5"></script>
<script src="/ruoyi/js/common.js?v=4.7.6"></script>
<script src="/ruoyi/js/ry-ui.js?v=4.7.6"></script>


<script src="/ajax/libs/bootstrap-fileinput/fileinput.min.js?v=5.5.2"></script>

<script>
    function submitHandler(da) {
        var prefix = ctx + "system/goods"
        alert("s")
        location.reload();
        $(".layui-layer-btn0").click(function (){
            if ($.validate.form()) {
                $.operate.save(prefix + "/list", '');
            }
        })
    }
    $(document).ready(function () {
        // 单图上传
        $("#singleFile").fileinput({
            uploadUrl: ctx + 'system/goods/upload',
            maxFileCount: 1,
            autoReplace: true,
            allowedFileExtensions: ['jpg', 'png', 'gif', 'jpeg'], //指定上传文件类型
            uploadExtraData:function(previewId, index) {   //额外参数
                var obj = {};
                obj.id = $("#id").val();// 这里回调方法
                return obj;
            }
        }).on('fileuploaded', function (event, data, previewId, index) {
            var rsp = data.response;
            log.info("return url：" + rsp.url)
            log.info("reutrn fileName：" + rsp.fileName)
            log.info("reutrn newFileName：" + rsp.newFileName)
            log.info("return originalFilename：" + rsp.originalFilename)
        }).on('fileremoved', function (event, id, index) {
            $("input[name='" + event.currentTarget.id + "']").val('')
        })


    });
    fodderType = function() {
        return $("#debugId").val();

    };

</script>
</body>
</html>
