<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('【请填写功能名称】列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label >仓库ID：</label>
                                <div class="col-sm-9">
                                    <select  id="gid" class="form-control" name="gid" th:with="type=${ck}" required>
                                        <option  value="">请选择仓库</option>
                                        <option th:each="uck : ${type}" th:text="${uck.sName}" th:value="${uck.uid}"></option>
                                    </select>
                                </div>

                            </li>
                            <li>
                                <label>商品：</label>

                                <div class="col-sm-9">
                                    <select  id="sid" class="form-control" name="sid" th:with="type=${hw}" required>
                                        <option value="">请选择商品</option>
                                        <option th:each="uck : ${type}" th:text="${uck.sName}" th:value="${uck.sid}"></option>
                                    </select>
                                </div>
                            </li>
                            <li>
                                <label>操作类型：</label>
                                <div class="col-sm-9">
                                    <select  id="stype" class="form-control" name="stype" required>
                                        <option value="">请选择操作类型</option>
                                        <option value="1">入库</option>
                                        <option value="2">出库</option>
                                    </select>
                                </div>
                            </li>
                            <li>
                                <label>数量：</label>
                                <div class="col-sm-9">
                                    <input id="snum" name="snum"  class="form-control" type="number" required>
                                </div>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="rck()"><i class="fa fa-search"></i>入库|出库</a>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-primary single " id="re" className="btn btn-warning" onClick="$.table.refresh()">
                    <i className="fa fa-refresh"></i> 刷新
                </a>
<!--                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:stock:edit">-->
<!--                    <i class="fa fa-edit"></i> 修改-->
<!--                </a>-->
<!--                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:stock:remove">-->
<!--                    <i class="fa fa-remove"></i> 删除-->
<!--                </a>-->

            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:stock:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:stock:remove')}]];
        var prefix = ctx + "system/stock";


        function rck(){

            var da=$('#gid').val();
            var da1=$('#sid').val();
            var stype=$('#stype').val();
            var snum=$('#snum').val();

            if(da==''){
                layer.msg("请选择仓库", {
                    icon: 7,
                    time: 500,

                },);
            }else if(da1==''){
                layer.msg("请选择商品", {
                    icon: 7,
                    time: 500,

                },);
            }else if(stype==''){
                layer.msg("请选择操作类型", {
                    icon: 7,
                    time: 500,

                },);
            }else if(snum==''){
                layer.msg("请输入数量", {
                    icon: 7,
                    time: 500,

                },);
            }else{

                $.ajax({
                    url: prefix + "/ick",
                    data: $('#formId').serialize(),
                    type: "post",
                    success: function(result) {
                        if (result.code == web_status.SUCCESS) {
                            console.log(result)
                            layer.msg(result.mes, {
                                icon: 1,
                                time: 500,

                            },function() {
                                $('#re').click()
                            });
                        } else {
                            alert(result.msg);
                        }
                    }
                })







            }








        }



        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "【请填写功能名称】",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: 'id',
                    visible: false
                },
                {
                    field: 'sid',
                    title: '商品ID'
                },
                {
                    field: 's_name',
                    title: '商品名字'
                },
                    {
                        field: 's_img',
                        title: '图片路径',
                        formatter: function(value, row, index) {

                            var  content = "<img src=" + row.s_img + " alt='' style='width:75px;height:75px' />"
                            return content;
                        }
                    },
                    {
                        field: 's_lb',
                        title: '类别'
                    },
                    {
                        field: 'gid',
                        title: '仓库ID'
                    },
                    {
                        field: 'cname',
                        title: '仓库名字'
                    },
                    {
                        field: 's_address',
                        title: '仓库位置'
                    },
                    {
                        field: 's_contenct',
                        title: '仓库描述'
                    },
                    {
                        field: 'snum',
                        title: '数量'
                    },
                {
                    field: 'stype',
                    title: '类型'

                },
                {
                    field: 'uname',
                    title: '操作人'
                 }
                // {
                //     title: '操作',
                //     align: 'center',
                //     formatter: function(value, row, index) {
                //         var actions = [];
                //         actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                //         actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                //         return actions.join('');
                //     }
                // }
                ]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
