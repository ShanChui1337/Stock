<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('【请填写功能名称】列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <input id="id" name="id"  class="form-control" th:value="${gid}" type="text" style="display:none">

            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-primary single " id="re" className="btn btn-warning" onClick="$.table.refresh()">
                    <i className="fa fa-refresh">刷新</i>
                </a>
<!--                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:stock:edit">-->
<!--                    <i class="fa fa-edit"></i> 修改-->
<!--                </a>-->
<!--                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:stock:remove">-->
<!--                    <i class="fa fa-remove"></i> 删除-->
<!--                </a>-->
<!--                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:stock:export">-->
<!--                    <i class="fa fa-download"></i> 导出-->
<!--                </a>-->
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:stock:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:stock:remove')}]];
        var prefix = ctx + "system/stock";



        //初始化查询条件传参
        queryParams = function(params) {

            var search = {'gid': $("#id").val()};
            search.pageSize = params.limit;
            search.pageNum = params.offset / params.limit + 1;
            search.searchValue = params.search;
            search.orderByColumn = params.sort;
            search.isAsc = params.order;
            return search;
            var comName =null;
        }

        //移库
        function yk(sid,gid,snum){
            //传入  商品ID   仓库ID

            var options = {
                title: "移库",
                width: '800',
                height: '500',
                url: prefix+"/yk?sid="+sid+"&ogid="+gid+"&snum="+snum,
                skin: 'layui-layer-gray',
                btn: ['关闭'],
                yes: function (index, layero) {
                    $.modal.close(index);
                }
            };
            $.modal.openOptions(options);

        }
        $(function() {
            var options = {
                url: prefix + "/lista",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "【请填写功能名称】",
                queryParams:queryParams,
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: 'id',
                    visible: false
                },
                {
                    field: 'sid',
                    title: '商品ID'
                },
                {
                    field: 's_name',
                    title: '商品名字'
                },
                    {
                        field: 's_img',
                        title: '图片路径',
                        formatter: function(value, row, index) {

                            var  content = "<img src=" + row.s_img + " alt='' style='width:75px;height:75px' />"
                            return content;
                        }
                    },
                    {
                        field: 's_lb',
                        title: '类别'
                    },
                    {
                        field: 'gid',
                        title: '仓库ID'
                    },
                    {
                        field: 'cname',
                        title: '仓库名字'
                    },
                    {
                        field: 's_address',
                        title: '仓库位置'
                    },
                    {
                        field: 's_contenct',
                        title: '仓库描述'
                    },
                    {
                        field: 'snum',
                        title: '数量'
                    },

                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="yk(\'' + row.sid +'\',\''+row.gid+ '\',\''+row.snum+'\')"><i class="fa fa-edit"></i>商品移库</a> ');
                        return actions.join('');
                    }
                }
                ]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
